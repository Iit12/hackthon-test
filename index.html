<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook LLM | AI Dashboard</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        #status-dot {
            height: 10px;
            width: 10px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ef4444;
        }
        .online { background-color: #10b981 !important; box-shadow: 0 0 10px #10b981 !important; }
        .data-box {
            background: #020617;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1.5rem;
            font-family: monospace;
            color: #38bdf8;
        }
        button {
            margin-top: 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); background: #2563eb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Notebook LLM</h1>
        <p><span id="status-dot"></span> System Status: <span id="status-text">Offline</span></p>
        
        <div class="data-box" id="data">
            Awaiting Signal...
        </div>

        <button onclick="checkBackend()">Refresh AI Brain</button>
    </div>

    <script>
        function checkBackend() {
            const dataDiv = document.getElementById('data');
            const dot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            dataDiv.innerText = "Syncing...";
            
            fetch('https://hackthon-test.onrender.com/')
                .then(res => res.json())
                .then(data => {
                    dataDiv.innerText = data.message;
                    dot.classList.add('online');
                    statusText.innerText = "Online";
                })
                .catch(err => {
                    dataDiv.innerText = "Error: Brain Not Found";
                    dot.classList.remove('online');
                    statusText.innerText = "Offline";
                });
        }
        // Run once on load
        checkBackend();
    </script>
</body>
</html>
